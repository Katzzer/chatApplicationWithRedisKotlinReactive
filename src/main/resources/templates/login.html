<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="/redis.png">
    <title>Login – Redis Chat</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #0369a1 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
      }

      .card {
        background: #1e293b;
        border-radius: 16px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        padding: 48px 40px 40px;
        width: 100%;
        max-width: 400px;
        animation: slideUp 0.4s ease;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .logo {
        text-align: center;
        margin-bottom: 32px;
      }

      .logo-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #1e3a8a, #0369a1);
        border-radius: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 4px 15px rgba(3, 105, 161, 0.4);
      }

      .logo-icon svg {
        width: 30px;
        height: 30px;
        fill: #fff;
      }

      .logo h1 {
        color: #f8fafc;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: -0.3px;
      }

      .logo p {
        color: #64748b;
        font-size: 0.9rem;
        margin-top: 4px;
      }

      .error-box {
        background: rgba(185, 28, 28, 0.15);
        border: 1px solid #b91c1c;
        color: #fca5a5;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 0.875rem;
        text-align: center;
        margin-bottom: 20px;
      }

      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        color: #94a3b8;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 7px;
      }

      .field input {
        width: 100%;
        padding: 12px 14px;
        background: #0f172a;
        border: 1.5px solid #334155;
        border-radius: 8px;
        color: #f1f5f9;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
        outline: none;
      }

      .field input:focus {
        border-color: #0369a1;
        box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.25);
      }

      .field input::placeholder { color: #475569; }

      .btn-primary {
        width: 100%;
        padding: 13px;
        margin-top: 8px;
        background: linear-gradient(135deg, #1e3a8a, #0369a1);
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.1s;
        letter-spacing: 0.2px;
      }

      .btn-primary:hover  { opacity: 0.9; transform: translateY(-1px); }
      .btn-primary:active { transform: translateY(0); }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 24px 0 18px;
        color: #475569;
        font-size: 0.8rem;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #334155;
      }

      .quick-label {
        text-align: center;
        color: #64748b;
        font-size: 0.8rem;
        margin-bottom: 12px;
        font-weight: 500;
      }

      .quick-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .btn-quick {
        padding: 11px 12px;
        background: #0f172a;
        border: 1.5px solid #334155;
        border-radius: 8px;
        color: #93c5fd;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s, border-color 0.2s, transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-quick:hover {
        background: #1e293b;
        border-color: #0369a1;
        transform: translateY(-1px);
      }

      .btn-quick:active { transform: translateY(0); }

      .avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
        color: #fff;
      }

      .avatar-john { background: #1d4ed8; }
      .avatar-jack { background: #0369a1; }

      .footer {
        text-align: center;
        color: #475569;
        font-size: 0.78rem;
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid #1e293b;
      }

      .footer a { color: #0369a1; text-decoration: none; }
      .footer a:hover { color: #93c5fd; }
    </style>
  </head>
  <body>
    <div class="card">

      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10
                     10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
          </svg>
        </div>
        <h1>Redis Chat</h1>
        <p>Sign in to continue</p>
      </div>

      <div th:if="${loginError}" class="error-box">
        Invalid username or password.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username"
                 placeholder="Enter username" required autofocus autocomplete="username">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password"
                 placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>

      <div class="divider">or quick login</div>

      <div class="quick-buttons">
        <button type="button" class="btn-quick" onclick="fillAndSubmit('john', 'john')">
          <span class="avatar avatar-john">J</span> John
        </button>
        <button type="button" class="btn-quick" onclick="fillAndSubmit('jack', 'jack')">
          <span class="avatar avatar-jack">J</span> Jack
        </button>
      </div>

      <div class="footer">
        <p>Created by <a href="http://www.pavelkostal.com" target="_blank">Pavel Kostal</a> &copy; 2025</p>
      </div>
    </div>

    <script>
      function fillAndSubmit(username, password) {
        document.getElementById('username').value = username;
        document.getElementById('password').value = password;
        document.querySelector('form').submit();
      }
    </script>
  </body>
</html>
